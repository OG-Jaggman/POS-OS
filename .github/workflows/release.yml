name: Build POSOS release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/make_release.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            posos-update.tar.gz
            posos-update.tar.gz.sha256
